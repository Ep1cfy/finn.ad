<!DOCTYPE html>
<html>
<head>
  <title>finn</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" type="image/x-icon" href="/favicon.png">

</head>

<body>
  <div class="introduction">
    <p>👤 | finn kelly</p>
    <p>📍 | ann arbor, michigan</p>
    <p>❓ | various personal projects</p>
  </div>

  <div class="now-playing" id="lastfm-card">
    <div class="np-header">
      <span id="np-status">last played</span>
      <a href="https://www.last.fm/user/ooazi"target="_blank"rel="noopener noreferrer"class="lastfm-link">
      <img src="/lastfm.png" alt="Last.fm" class="lastfm-icon">
      </a>
    </div>

    <div class="np-body">
      <img id="np-cover" src="" alt="Album cover">
      <div>
        <div id="np-track">Loading...</div>
        <div id="np-artist"></div>
      </div>
    </div>
  </div>
  <div class="taskbar-left">
      <img src="/favicon.png" alt="???" class="physics-sim-icon" onclick=startPhysicsMode()>
  </div>
  <div class="taskbar-center">
      <div id="playcount">🎵</div>
  </div>
  <div class="project-timeline physics-object">
        <div class="timeline-title">projects</div>
      
        <div class="timeline-items">
          <a class="timeline-item" href="#" title="fortnite retweet bot + site sunsetted">
            <span class="timeline-dot"></span>
            <span class="timeline-date">2022</span>
            <span class="timeline-name">fortnite retweet bot + site sunsetted</span>
          </a>
          <a class="timeline-item" href="#" title="ListenBrainz tools">
            <span class="timeline-dot"></span>
            <span class="timeline-date">2025</span>
            <span class="timeline-name">music tools</span>
          </a>
          <a class="timeline-item" href="#" title="Personal site">
            <span class="timeline-dot"></span>
            <span class="timeline-date">2026</span>
            <span class="timeline-name">finn.ad</span>
          </a>
        </div>
      </div>
  <script src="/lastfm_clientside.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
  <script src="/physics.js"></script>
</body>
</html>
